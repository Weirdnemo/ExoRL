[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "planet-rl"
version = "0.1.0"
description = "A reinforcement learning environment for planetary science."
readme = "README.md"
requires-python = ">=3.8"
dependencies = [
    "numpy",
    "matplotlib",
]

[project.optional-dependencies]
# RL stack used by scripts/ (kept optional so the core science stack stays light)
rl = [
    "gymnasium",
    "stable-baselines3",
    "torch",
]

# Developer tooling
dev = [
    "pytest",
    "ruff",
]

[project.scripts]
planet-rl = "planet_rl.cli:main"

[tool.setuptools.packages.find]
include = ["planet_rl", "planet_rl.*"]
