[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "planet-rl"
version = "0.1.0"
description = "A reinforcement learning environment for planetary science."
readme = "README.md"
requires-python = ">=3.8"
dependencies = [
    "numpy",
    "matplotlib",
    # Add any other missing dependencies here
]

[tool.setuptools.packages.find]
include = ["planet_rl", "planet_rl.*"]
