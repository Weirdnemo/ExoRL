name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  smoke-matrix:
    name: Smoke (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Smoke check import and CLI
        run: |
          python -c "import exorl; print('import ok')"
          exorl --help
          exorl train --help
          exorl demo --help
          exorl eval --help
          exorl planet --help
          exorl population --help
          exorl figure --help

  extras-linux:
    name: Extras install checks (ubuntu, py3.11)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Validate optional dependency groups
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[rl]"
          pip install -e ".[science]"
          pip install -e ".[dev]"
          pip install -e ".[all]"

  quality-linux:
    name: Quality gates (ubuntu, py3.11)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pre-commit
        run: pre-commit run --all-files

      - name: Run tests with coverage
        run: pytest

      - name: Run mypy checks
        run: mypy
